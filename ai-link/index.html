<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Link</title>
    <style>
        body {
            margin: 0;
            background: #040508;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            cursor: pointer; /* Suggests the whole screen is clickable */
        }

        .nebula {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 70% 20%, rgba(0, 210, 255, 0.18) 0%, transparent 50%),
                radial-gradient(circle at 20% 80%, rgba(112, 40, 228, 0.15) 0%, transparent 50%);
            z-index: -1;
        }

        .ai-logo {
            width: 130px;
            height: 130px;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 50%, #8e2de2 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            font-weight: 800;
            border-radius: 35px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 40px rgba(0, 210, 255, 0.25);
            opacity: 0;
            will-change: transform, opacity;
            animation: cinematicApproach 2.6s ease-in-out forwards;
        }

        @keyframes cinematicApproach {
            0% { transform: translate(40vw, -40vh) scale(0) rotate(25deg); opacity: 0; }
            25% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
            40% { transform: scale(1); opacity: 1; }
            100% { transform: scale(55); opacity: 0; }
        }

        .skip-hint {
            position: absolute;
            bottom: 5%;
            color: rgba(255, 255, 255, 0.2);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="nebula"></div>
    <div class="ai-logo" id="logo">AI</div>
    <div class="skip-hint" id="hint">Press any key or click to open</div>

    <script>
        let targetUrl = "";
        let openNewTab = false;
        let isRedirected = false;

        async function init() {
            try {
                const response = await fetch('config.json');
                const config = await response.json();
                targetUrl = config.target_url;
                openNewTab = config.open_in_new_tab;

                if (config.disable_animation) {
                    executeLink();
                } else {
                    // Automatically try to open after 2.6s
                    setTimeout(executeLink, 2600);
                }
            } catch (err) {
                document.getElementById('hint').innerText = "Config Error";
            }
        }

        function executeLink() {
            if (isRedirected || !targetUrl) return;

            if (openNewTab) {
                const newWindow = window.open(targetUrl, '_blank');
                
                if (newWindow) {
                    // Tab opened successfully
                    isRedirected = true;
                    // Go back to the dashboard on the current tab
                    window.history.back();
                } else {
                    // Browser blocked the popup (common for auto-redirects)
                    document.getElementById('hint').innerText = "Popup Blocked! Click anywhere to open.";
                    document.getElementById('hint').style.color = "#ff4d4d";
                }
            } else {
                isRedirected = true;
                window.location.href = targetUrl;
            }
        }

        // Handle User Interaction (Guarantees the tab opens)
        const handleInteraction = (e) => {
            if (!isRedirected) executeLink();
        };

        window.addEventListener('keydown', handleInteraction);
        window.addEventListener('mousedown', handleInteraction);
        window.addEventListener('touchstart', handleInteraction);

        init();
    </script>
</body>
</html>
