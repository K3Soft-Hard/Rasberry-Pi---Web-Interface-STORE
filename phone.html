<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RP5a Mobile</title>
    <script src="/auth.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #0099ff; --red: #ff3333; --green: #00ff66; --yellow: #ffee00; }
               
        body { 
            margin: 0; 
            padding: 0; 
            background: #0f0f0f url('background.png') no-repeat center center fixed; 
            background-size: cover; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            color: white; 
            overflow-x: hidden;
            backdrop-filter: blur(3px); 
        }

        .plugin-header {
            position: sticky;
            top: 0;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            z-index: 1000;
            text-align: center;
        }

        .pi-name { 
            font-size: 18px; 
            font-weight: 900; 
            letter-spacing: 2px; 
            color: var(--yellow); 
            margin-bottom: 12px;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 120px); 
            padding: 20px;
            box-sizing: border-box;
        }

        .menu-items {
            flex-grow: 1; 
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .bottom-actions { 
            position: sticky; 
            margin-top: auto; 
            bottom: 0;
            left: 0;
            right: 0;
            display: flex; 
            justify-content: space-around; 
            padding: 20px 15px; 
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        #plugin-bar {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: none; 
        }
        #plugin-bar::-webkit-scrollbar { display: none; }

        .nav-item {
            white-space: nowrap;
            color: #fff;
            text-decoration: none;
            font-size: 13px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h2 { font-size: 12px; color: #ffffff; letter-spacing: 2px; margin: 10px 0; text-transform: uppercase; }

        .menu-button { 
            display: flex; 
            align-items: center; 
            gap: 15px;
            padding: 18px; 
            background: rgba(0, 0, 0, 0.4); 
            color: white; 
            text-decoration: none; 
            border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            font-weight: 600; 
            font-size: 16px;
            touch-action: manipulation;
            /* The 3px Blur Effect */
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
        }

        .custom-item .menu-button { 
            flex-grow: 1; 
            background: rgba(0, 0, 0, 0.6); 
            border-style: dashed; 
            border-color: rgba(255, 255, 255, 0.1);
        }

        .del-site { 
            background: rgba(0, 0, 0, 0.5); 
            color: var(--red); 
            padding: 18px; 
            border-radius: 12px;
            border: 2px solid rgba(255, 0, 0, 0.633);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-button:active {
            background: rgba(0, 153, 255, 0.3);
            border-color: var(--blue);
        }

        .menu-button:active, .del-site:active {
        background: rgba(255, 255, 255, 0.1);
        transform: scale(0.98);
        }

        .menu-button i { color: var(--blue); width: 20px; text-align: center; }

        .custom-item { display: flex; align-items: center; gap: 10px; }

        .action-btn { 
            background: #222; 
            color: white; 
            border: 1px solid #444; 
            width: 60px; 
            height: 60px; 
            border-radius: 50%; 
            font-size: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        .btn-lock { color: var(--yellow); }
        .btn-add { color: var(--green); }
        .btn-shutdown { color: var(--red); }

    </style>
</head>
<body>

<header class="plugin-header">
    <div class="pi-name">PI DASHBOARD</div>
    <div id="plugin-bar">
        </div>
</header>

<div class="main-container">
    <h2>APPLICATIONS</h2>
    <div class="menu-items">
        <a href="/editor.html" class="menu-button"><i class="fa-solid fa-code"></i> Pi Editor</a>
        <a href="/transfer.html" class="menu-button"><i class="fa-solid fa-file-import"></i> Pi Transfer</a>
        <a href="/video/video.html" class="menu-button"><i class="fa-solid fa-video"></i> Video Player</a>
        <a href="/photo/photo.html" class="menu-button"><i class="fa-solid fa-image"></i> Photo Viewer</a>
        <a href="/music/music.html" class="menu-button"><i class="fa-solid fa-music"></i> Music Player</a>
        <a href="/admin.html" class="menu-button"><i class="fa-solid fa-gears"></i> Admin Panel</a>
        <div id="sharedSites" class="menu-items"></div>
    </div>
</div>

<div class="bottom-actions">
    <button class="action-btn btn-lock" onclick="logoutPi()"><i class="fa-solid fa-lock"></i></button>
    <button class="action-btn btn-add" onclick="addSite()"><i class="fa-solid fa-plus"></i></button>
    <button class="action-btn btn-shutdown" onclick="shutdownPi()"><i class="fa-solid fa-power-off"></i></button>
</div>

<script>
        async function loadPlugins() {
    try {
        const res = await fetch('/api/plugins');
        const data = await res.json();
        const bar = document.getElementById('plugin-bar');
        if (!bar) return;
        
        bar.innerHTML = ""; 
        data.forEach(p => {
            const link = document.createElement('a');
            link.href = p.path;
            link.className = 'nav-item';
            
            // This part chooses the icon:
            // It uses p.icon if it exists, otherwise it defaults to 'plug'
            const iconName = p.icon ? p.icon : 'plug';
            
            link.innerHTML = `<i class="fas fa-${iconName}"></i> ${p.name}`;
            bar.appendChild(link);
        });
    } catch (err) {
        console.error("Plugins not found");
    }
}

        // 2. Shutdown Function
        async function shutdownPi() {
            if(confirm("Shutdown Raspberry Pi?")) {
                await fetch('/api/shutdown', {method: 'POST'});
                alert("Shutdown command sent.");
            }
        }

        // 3. Shared Links Logic
        let sharedLinks = [];
        async function loadLinks() {
            try {
                const res = await fetch('/api/get_links');
                sharedLinks = await res.json();
                render();
            } catch (e) { }
        }

        async function saveLinks() {
            await fetch('/api/save_links', { method: 'POST', body: JSON.stringify(sharedLinks) });
            render();
        }

        function addSite() {
            const name = prompt("Site Name:");
            const path = prompt("Path:");
            if (name && path) { sharedLinks.push({ id: Date.now(), name, path }); saveLinks(); }
        }

        function deleteSite(id) {
            if (confirm("Delete this link?")) { sharedLinks = sharedLinks.filter(s => s.id !== id); saveLinks(); }
        }

        function render() {
            const container = document.getElementById('sharedSites');
            container.innerHTML = sharedLinks.map(site => `
                <div class="custom-item">
                    <a href="${site.path}" class="menu-button">${site.name}</a>
                    <span class="del-site" onclick="deleteSite(${site.id})"><i class="fa-solid fa-trash-can"></i></span>
                </div>
            `).join('');
        }

        // Start everything on load
        document.addEventListener("DOMContentLoaded", () => {
            loadPlugins();
            loadLinks();
        });
</script>

</body>
</html>
